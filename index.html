<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Minimal Flappy Bird</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@300;500&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="game-wrapper">
        <canvas id="gameCanvas" width="360" height="640"></canvas>
        <div class="overlay" id="overlay">
          <div class="card">
            <h1 class="title">Minimal Flappy</h1>
            <p class="subtitle">Press <strong>Space</strong> or <strong>Click</strong> to jump</p>
            <button id="startButton">Start</button>
          </div>
        </div>
        <div class="hud">
          <span id="score">0</span>
        </div>
      </div>
    </div>
    <script src="game.js"></script>
  </body>
</html>
